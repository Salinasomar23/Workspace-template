<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>styling-inside-out</title>
</head>
<body>
    <article>
  <h1 style="font-size:3rem; font-weight:900; letter-spacing: 0.02em;">
    The Tyger
  </h1>
  
  <p style="color:#ADD8E6;font-size: 20px; line-height: 1.3;">
    Tyger, Tyger, burning bright
  </p>
  
  <p style="color:#ADD8E6;font-size: 20px; line-height: 1.3;">
    In the forests of the night    
  </p>
  
    <p style="color:#ADD8E6;font-size: 20px; line-height: 1.9;">
    What immortal hand or eye   
  </p>
  
  <p style="color:#ADD8E6;font-size: 20px; letter-spacing: 0.9px;">
    Could frame thy fearful symmetry  
  </p>
  
  <p style="color:#FF0000;font-size: 15px; font-weight: 500;">
    -by William Blake  
  </p>
</article>

</body>
</html>
